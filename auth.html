<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniTale - Authentication</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    
    <h1>AniTale</h1>

    <div style="margin-bottom: 10px;">
      <button id="showLogin" class="active">Login</button>
      <button id="showSignup">Sign Up</button>
    </div>

    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" id="loginBtn">Login</button>
      <button type="button" class="googleLoginBtn">Sign in with Google</button>
    </form>

    <form id="signupForm" style="display: none;">
      <input type="text" id="signupName" placeholder="Full Name" required>
      <input type="text" id="signupUsername" placeholder="Username" required>
      <input type="email" id="signupEmail" placeholder="Email" required>
      <input type="password" id="signupPassword" placeholder="Password" required>
      
      <div class="modal-field">
        <input id="signupBirthdate" type="date" required />
      </div>
      
      <div class="modal-field">
        <select id="signupGender" required>
          <option value="" disabled selected>Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <button type="submit" id="signupBtn">Sign Up</button>
      <button type="button" class="googleLoginBtn">Sign up with Google</button>
    </form>

  </main>

  <footer class="footer">
    © AniTale. All rights reserved.
  </footer>

  <script type="module">
    import { initAuthPage } from "./js/auth.js";
    initAuthPage();
  </script>
</body>
</html>
