<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniTale - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">AniTale</div>
      <nav>
        <a href="index.html" class="active">Home</a>
        <a href="feed.html">Community Feed</a>
        <a href="schedule.html">Schedule</a>
        <a href="diary.html">My Diary</a>
      </nav>
    </div>
    <div id="navAuthContainer">
      <p style="opacity: 0.5; font-size: 13px;">Loading account...</p>
    </div>
  </header>

  <main>
    <div style="width: 88%; max-width: 1400px; margin: 40px auto 0;">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
        <h2 id="mainHeadingTitle" class="section-title" style="margin: 0;">Trending Seasonal Collection</h2>
        
        <div style="display: flex; align-items: center; gap: 12px; width: 100%; max-width: 500px;">
          <div class="search-container" style="margin: 0; max-width: none;">
            <input type="text" id="searchInput" placeholder="Search anime series...">
            <button id="searchBtn" type="button">Search</button>
          </div>
          <button id="filterToggleBtn" type="button" style="background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-main); font-size: 13px; font-weight: 600; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease;">
            ⚙️ Filters
          </button>
        </div>
      </div>

      <div id="filterDrawer" class="select-hide" style="background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
          
          <div class="modal-field" style="margin: 0;">
            <label>Genre Category</label>
            <select id="filterGenre">
              <option value="">All Genres</option>
              <option value="1">Action</option>
              <option value="2">Adventure</option>
              <option value="4">Comedy</option>
              <option value="8">Drama</option>
              <option value="10">Fantasy</option>
              <option value="22">Romance</option>
              <option value="24">Sci-Fi</option>
              <option value="36">Slice of Life</option>
              <option value="37">Supernatural</option>
            </select>
          </div>

          <div class="modal-field" style="margin: 0;">
            <label>Order Criteria</label>
            <select id="filterOrderBy">
              <option value="popularity">Popularity</option>
              <option value="score">Community Score</option>
              <option value="title">Alphabetical</option>
            </select>
          </div>

          <div class="modal-field" style="margin: 0;">
            <label>Age Rating</label>
            <select id="filterRating">
              <option value="">Any Rating</option>
              <option value="g">G - General Audience</option>
              <option value="pg13">PG-13 - Teens</option>
              <option value="r17">R - 17+ Violence</option>
            </select>
          </div>

        </div>
        
        <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
          <button id="resetFiltersBtn" type="button" class="modal-btn cancel" style="padding: 10px 20px; border-radius: 8px;">Reset</button>
          <button id="applyFiltersBtn" type="button" class="modal-btn save" style="padding: 10px 20px; border-radius: 8px;">Apply Filters</button>
        </div>
      </div>
    </div>
    
    <div id="animeList" class="anime-grid" style="margin-top: 40px;"></div>
  </main>

  <div id="toast-container"></div>

  <footer class="footer">
    © AniTale. All rights reserved.
  </footer>

  <script type="module">
    import { initAuthLink } from "./js/auth.js";
    import { initHomePage } from "./js/home.js";
    import { setupScrollEffects } from "./js/ui.js";
    initAuthLink();
    initHomePage();
    setupScrollEffects();
  </script>
</body>
</html>
